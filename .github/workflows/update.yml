# ============================================================
# A股行情仪表盘 — 自动更新工作流
# ============================================================
# 交易时段每30分钟：
#   1. 从 AKShare (东方财富) 抓取最新 A 股行情
#   2. 生成自包含 HTML 仪表盘 → docs/index.html
#   3. 部署到 GitHub Pages
#
# 无需任何 API Key，全部免费。
# ============================================================

name: 股市行情自动更新

on:
  schedule:
    # 每30分钟执行一次（UTC 时间）
    # A股交易时段 9:30-15:30 北京时间 = 1:30-7:30 UTC
    - cron: '*/30 * * * 1-5'
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "stock-update"
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt

      - name: 运行数据抓取 & 报告生成
        run: |
          echo "📊 A股行情仪表盘启动"
          python generate_dashboard.py

      - name: 提交生成的仪表盘
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status docs/index.html --porcelain)" ]; then
            git add docs/index.html
            git commit -m "📊 自动更新股市行情 — $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "数据无变化，跳过提交"
          fi

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传页面制品
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

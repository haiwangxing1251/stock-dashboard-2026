<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A股行情仪表盘 | 自动更新</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: #0f1117;
    color: #e8eaed;
    line-height: 1.6;
    min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 16px; }

/* ---- Header ---- */
.header {
    text-align: center;
    padding: 40px 24px 32px;
    background: linear-gradient(135deg, #1a237e 0%, #0d47a1 50%, #006064 100%);
    border-radius: 16px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
}
.header::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.04) 0%, transparent 60%);
    animation: rotate 25s linear infinite;
}
@keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.header h1 { font-size: 28px; font-weight: 700; position: relative; }
.header p { color: rgba(255,255,255,0.7); margin-top: 8px; font-size: 14px; position: relative; }

/* ---- Cards ---- */
.card {
    background: #1a1d29;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
}
.card-title {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid #2a2d3a;
    display: flex;
    align-items: center;
    gap: 8px;
}
.card-title .icon { font-size: 20px; }

/* ---- Market Overview ---- */
.overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
}
.stat-box {
    text-align: center;
    padding: 16px 12px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
}
.stat-value { font-size: 28px; font-weight: 700; }
.stat-label { font-size: 12px; color: #8b8fa3; margin-top: 4px; }
.stat-up .stat-value { color: #ef5350; }
.stat-down .stat-value { color: #66bb6a; }
.stat-flat .stat-value { color: #ffd54f; }

/* ---- Ratio Bar ---- */
.ratio-bar {
    height: 8px;
    border-radius: 4px;
    overflow: hidden;
    display: flex;
    margin-top: 12px;
    background: #2a2d3a;
}
.ratio-up { background: #ef5350; width: 50.0%; }
.ratio-down { background: #66bb6a; width: 50.0%; }
.ratio-label { display: flex; justify-content: space-between; font-size: 12px; color: #8b8fa3; margin-top: 6px; }

/* ---- Index Cards ---- */
.index-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 12px;
}
.idx-card {
    padding: 14px;
    border-radius: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid #2a2d3a;
}
.idx-name { font-size: 13px; color: #8b8fa3; }
.idx-price { font-size: 22px; font-weight: 700; margin-top: 4px; }
.idx-change { font-size: 14px; font-weight: 600; margin-top: 2px; }
.idx-amount { font-size: 11px; color: #8b8fa3; margin-top: 4px; }

/* ---- Tables ---- */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
}
th {
    text-align: left;
    padding: 10px 12px;
    font-weight: 600;
    color: #8b8fa3;
    font-size: 12px;
    text-transform: uppercase;
    border-bottom: 1px solid #2a2d3a;
}
td {
    padding: 10px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
}
.stock-name { font-weight: 600; }
.sector-name { font-weight: 500; }
.num { font-variant-numeric: tabular-nums; text-align: right; }
tr:hover { background: rgba(255,255,255,0.03); }

/* ---- Bar ---- */
.bar-container {
    height: 6px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
}
.bar-fill { height: 100%; min-width: 2px; transition: width 0.3s; }

/* ---- Two Column ---- */
.two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}
@media (max-width: 768px) {
    .two-col { grid-template-columns: 1fr; }
    .index-grid { grid-template-columns: repeat(2, 1fr); }
    .overview-grid { grid-template-columns: repeat(2, 1fr); }
    .container { padding: 8px; }
    .header h1 { font-size: 22px; }
}

/* ---- Footer ---- */
.footer {
    text-align: center;
    padding: 20px;
    font-size: 12px;
    color: #8b8fa3;
}
.disclaimer {
    background: rgba(255, 215, 0, 0.08);
    border: 1px solid rgba(255, 215, 0, 0.2);
    border-radius: 8px;
    padding: 12px;
    margin-top: 16px;
    font-size: 12px;
    color: #ffd54f;
    text-align: center;
}
</style>
</head>

<script>
// 动态显示"X分钟前"
document.addEventListener('DOMContentLoaded', function() {
    var utcStr = document.querySelector('.footer [data-utc]')?.dataset.utc;
    if (!utcStr) return;
    var utcDate = new Date(utcStr);
    function update() {
        var diff = Math.floor((Date.now() - utcDate.getTime()) / 60000);
        var text;
        if (diff < 1) text = '刚刚更新';
        else if (diff < 60) text = diff + ' 分钟前更新';
        else if (diff < 1440) text = Math.floor(diff / 60) + ' 小时前更新';
        else text = Math.floor(diff / 1440) + ' 天前更新';
        document.getElementById('update-time').textContent = text;
    }
    update();
    setInterval(update, 60000);
});
</script>
